name: Preview Publish

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  preview:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Set preview package version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          PREVIEW_VERSION="${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}.${{ github.run_attempt }}.${SHORT_SHA}"
          npm version "$PREVIEW_VERSION" --no-git-tag-version
          echo "PREVIEW_VERSION=$PREVIEW_VERSION" >> "$GITHUB_ENV"
          echo "PREVIEW_TAG=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"

      - name: Publish preview to npm
        run: pnpm publish --access public --tag "$PREVIEW_TAG" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment install instructions on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- uzi-preview-build -->';
            const body = `${marker}
            Preview package published.

            Floating PR tag:

            \`\`\`bash
            pnpm add @tomny-dev/uzi@${process.env.PREVIEW_TAG}
            \`\`\`

            Exact published version:

            \`\`\`bash
            pnpm add @tomny-dev/uzi@${process.env.PREVIEW_VERSION}
            \`\`\`

            Published version: \`${process.env.PREVIEW_VERSION}\`

            Use the PR tag to track the latest preview build for this PR. Use the exact version to pin a specific build.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
        env:
          PREVIEW_TAG: ${{ env.PREVIEW_TAG }}
          PREVIEW_VERSION: ${{ env.PREVIEW_VERSION }}
